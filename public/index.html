// ─── HELPERS ────────────────────────────────────────────────────────
function getActivity(code) { return ACTIVITIES.find(a => a.code === code); }

function filterActivities(activities, filters) {
  return activities.filter(a => {
    if (filters.domain && a.domain !== filters.domain) return false;
    if (filters.pillar && a.pillar !== filters.pillar) return false;
    if (filters.horizon && a.horizon !== filters.horizon) return false;
    if (filters.ehdsOnly && !a.ehds) return false;
    if (filters.search) {
      const s = filters.search.toLowerCase();
      const desc = Array.isArray(a.description) ? a.description.join(' ') : (a.description || '');
      return a.code.toLowerCase().includes(s) || a.name.toLowerCase().includes(s) || desc.toLowerCase().includes(s);
    }
    return true;
  });
}

// Activity card (compact)
function ActivityCard({ activity, onClick, highlighted, dimmed }) {
  const dc = DOMAIN_COLORS[activity.domain];
  return (
    <button
      onClick={() => onClick(activity)}
      className={`w-full text-left p-2.5 rounded-lg border-l-4 ${dc.border} bg-white shadow-sm hover:shadow-md transition-all duration-150 cursor-pointer group ${dimmed ? 'opacity-30' : ''} ${highlighted ? 'ring-2 ring-offset-1 ring-awareness' : ''}`}
    >
      <div className="flex items-start justify-between gap-1">
        <span className={`text-xs font-bold ${dc.text}`}>{activity.code}</span>
        <div className="flex gap-1 flex-shrink-0">
          {activity.ehds && <span className="text-[10px] px-1.5 py-0.5 rounded bg-awareness-light text-awareness-dark font-medium">EHDS</span>}
        </div>
      </div>
      <p className="text-xs text-gray-700 mt-0.5 leading-snug line-clamp-2 group-hover:text-gray-900">{activity.name}</p>
      <div className="flex gap-1.5 mt-1.5 flex-wrap">
        {activity.pillar && <span className="text-[10px] px-1.5 py-0.5 rounded bg-gray-100 text-gray-600 inline-flex items-center gap-1"><DomainIcon name={activity.pillar} size={12} />{activity.pillar}</span>}
        <span className="text-[10px] px-1.5 py-0.5 rounded bg-gray-100 text-gray-500">{HORIZONS.find(h=>h.value===activity.horizon)?.label}</span>
      </div>
    </button>
  );
}

// Enrich plain text with bold numbers/percentages, key terms, and known links
function enrichText(text) {
  if (!text) return '';
  let html = text
    // Escape HTML first
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // Bold numbers with units (€3–5M, 750+, 38%, 200+, 80%, 50%, 10+, etc.)
    .replace(/(\u20AC|€)[\d,.\u2013\u2014–-]+[MBK]?(?:\/yr)?/g, '<strong>$&</strong>')
    .replace(/\b(\d[\d,.]*\+?)\s*(%|percent|scholars|specialists|women|countries|variables|innovations|users|hubs|ICSs)/gi, '<strong>$1 $2</strong>')
    .replace(/\b(\d+[\u2013–-]\d+)\s*(year|month|week|day)/gi, '<strong>$1 $2</strong>')
    // Bold key terms
    .replace(/(EHDS|EHDS Critical|Accelerator Loop|Federated Cohort|Data Dictionary|Intelligence Layer|Living Guideline Platform|Catalytic Fund|Regulatory Sandbox)/g, '<strong>$1</strong>')
    // Link activity codes like R-D-1, C-Po-1, etc.
    .replace(/\b([RCAI]-[A-Za-z]+-?\d)\b/g, '<span class="text-research font-medium">$1</span>')
    // Inline-link known programmes/initiatives mentioned in text
    .replace(/\bEuroLLM\b/g, '<a href="https://eurollm.io/" target="_blank" rel="noopener" class="text-research hover:underline">EuroLLM</a>')
    .replace(/\bLLMs4Europe\b/g, '<a href="https://www.alt-edic.eu/projects/llms4eu/" target="_blank" rel="noopener" class="text-research hover:underline">LLMs4Europe</a>')
    .replace(/\bOpenEuroLLM\b/g, '<a href="https://openeurollm.eu/" target="_blank" rel="noopener" class="text-research hover:underline">OpenEuroLLM</a>')
    .replace(/\bRADAR-base\b/g, '<a href="https://radar-base.org/" target="_blank" rel="noopener" class="text-research hover:underline">RADAR-base</a>')
    .replace(/\bFEMaLe Project\b/g, '<a href="https://findingendometriosis.eu/" target="_blank" rel="noopener" class="text-research hover:underline">FEMaLe Project</a>')
    .replace(/\bMyHealth@MyHands\b/g, '<a href="https://myhealthmyhands.eu/" target="_blank" rel="noopener" class="text-research hover:underline">MyHealth@MyHands</a>')
    .replace(/\bNIH BIRCWH\b/g, '<a href="https://orwh.od.nih.gov/building-interdisciplinary-research-careers-in-womens-health-bircwh" target="_blank" rel="noopener" class="text-research hover:underline">NIH BIRCWH</a>')
    .replace(/\bNordForsk\b/g, '<a href="https://www.nordforsk.org/" target="_blank" rel="noopener" class="text-research hover:underline">NordForsk</a>')
    .replace(/\bEIT Health\b/g, '<a href="https://eithealth.eu/" target="_blank" rel="noopener" class="text-research hover:underline">EIT Health</a>')
    .replace(/\bFindata\b/g, '<a href="https://findata.fi/en/" target="_blank" rel="noopener" class="text-research hover:underline">Findata</a>')
    .replace(/\bOHDSI\b/g, '<a href="https://www.ohdsi.org/" target="_blank" rel="noopener" class="text-research hover:underline">OHDSI</a>')
    .replace(/\bHL7 Europe\b/g, '<a href="https://hl7.eu/fhir/" target="_blank" rel="noopener" class="text-research hover:underline">HL7 Europe</a>')
    .replace(/\bNordDEC\b/g, '<a href="https://norddec.org/" target="_blank" rel="noopener" class="text-research hover:underline">NordDEC</a>')
    .replace(/\bICHOM\b/g, '<a href="https://www.ichom.org/" target="_blank" rel="noopener" class="text-research hover:underline">ICHOM</a>')
    .replace(/\bAmbuFlex\b/g, '<a href="https://www.fagperson.sundhed.rm.dk/til-ansatte-og-samarbejdspartnere/ambuflex/om-ambuflex/in-english/" target="_blank" rel="noopener" class="text-research hover:underline">AmbuFlex</a>')
    // Restore already-bold items that got double-escaped
    .replace(/&lt;strong&gt;/g, '<strong>').replace(/&lt;\/strong&gt;/g, '</strong>');
  return html;
}

function GridView({ activities, onSelect, highlightedCodes }) {
  const grid = useMemo(() => {
    const g = {};
    DOMAINS.forEach(d => { g[d] = {}; PILLARS.forEach(p => { g[d][p] = []; }); });
    activities.filter(a => a.domain !== "Awareness").forEach(a => {
      if (a.pillar && g[a.domain]?.[a.pillar]) g[a.domain][a.pillar].push(a);
    });
    return g;
  }, [activities]);
  const awarenessItems = activities.filter(a => a.domain === "Awareness");
  const loopRoleMap = { Research:"Produce", Care:"Adopt", Innovation:"Translate" };

  // All domain activities flat for mobile
  const domainActivities = useMemo(() => {
    const result = {};
    DOMAINS.forEach(d => { result[d] = activities.filter(a => a.domain === d); });
    return result;
  }, [activities]);

  return (
    <div className="space-y-3">
      {/* ── Desktop: 5-column grid (hidden on mobile) ── */}
      <div className="hidden md:block space-y-3">
        <div className="grid grid-cols-[140px_repeat(4,1fr)] gap-2">
          <div />
          {PILLARS.map(p => (
            <div key={p} className="text-center text-sm font-semibold text-gray-600 py-1.5 flex items-center justify-center gap-1.5">
              <DomainIcon name={p} size={20} />{p}
            </div>
          ))}
        </div>
        {DOMAINS.map(domain => {
          const dc = DOMAIN_COLORS[domain];
          return (
            <div key={domain} className="grid grid-cols-[140px_repeat(4,1fr)] gap-2">
              <div className={`${dc.bg} rounded-lg p-3 flex flex-col justify-center border ${dc.border}`}>
                <span className={`text-sm font-bold ${dc.text} flex items-center gap-1.5`}><DomainIcon name={domain} size={22} />{domain}</span>
                <span className="text-[10px] text-gray-500 uppercase tracking-wider mt-0.5">{loopRoleMap[domain]}</span>
              </div>
              {PILLARS.map(pillar => (
                <div key={pillar} className="bg-white rounded-lg p-2 min-h-[80px] space-y-1.5 border border-gray-100">
                  {grid[domain][pillar].map(a => (
                    <ActivityCard key={a.code} activity={a} onClick={onSelect} highlighted={highlightedCodes?.includes(a.code)} dimmed={false} />
                  ))}
                  {grid[domain][pillar].length === 0 && (
                    <div className="h-full flex items-center justify-center text-gray-300 text-xs">—</div>
                  )}
                </div>
              ))}
            </div>
          );
        })}
      </div>

      {/* ── Mobile: stacked domain sections (hidden on desktop) ── */}
      <div className="md:hidden space-y-4">
        {DOMAINS.map(domain => {
          const dc = DOMAIN_COLORS[domain];
          const items = domainActivities[domain];
          if (items.length === 0) return null;
          return (
            <div key={domain}>
              <div className={`${dc.bg} rounded-lg px-3 py-2 border ${dc.border} flex items-center gap-2 mb-2`}>
                <DomainIcon name={domain} size={20} />
                <span className={`text-sm font-bold ${dc.text}`}>{domain}</span>
                <span className="text-[10px] text-gray-500 uppercase tracking-wider">{loopRoleMap[domain]}</span>
                <span className="text-[10px] text-gray-400 ml-auto">{items.length} activities</span>
              </div>
              <div className="grid grid-cols-2 gap-2">
                {items.map(a => (
                  <ActivityCard key={a.code} activity={a} onClick={onSelect} highlighted={highlightedCodes?.includes(a.code)} dimmed={false} />
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {/* Awareness strip (shared) */}
      <div id="awareness-foundation" className={`bg-awareness-light rounded-lg p-4 border border-awareness`}>
        <div className="flex items-center gap-2 mb-3">
          <span className="text-sm font-bold text-awareness-dark flex items-center gap-1.5"><DomainIcon name="Awareness" size={22} /> Awareness Foundation</span>
          <span className="text-[10px] text-gray-500 uppercase tracking-wider">ENABLE</span>
        </div>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
          {awarenessItems.map(a => (
            <ActivityCard key={a.code} activity={a} onClick={onSelect} highlighted={highlightedCodes?.includes(a.code)} dimmed={false} />
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── ACCELERATOR LOOP VIEW ──────────────────────────────────────────
function LoopView({ activities, onSelect }) {
  const [hoveredFlow, setHoveredFlow] = useState(null);

  const stages = useMemo(() => ({
    Produce: activities.filter(a => a.loopRole === "Produce"),
    Translate: activities.filter(a => a.loopRole === "Translate"),
    Adopt: activities.filter(a => a.loopRole === "Adopt"),
    Enable: activities.filter(a => a.loopRole === "Enable"),
  }), [activities]);

  const flowCodes = hoveredFlow ? [hoveredFlow.produce, hoveredFlow.translate, hoveredFlow.adopt] : [];

  const stageConfig = [
    { key:"Produce", label:"Research Produces", color:"bg-research", lightBg:"bg-research-light", borderColor:"border-research" },
    { key:"Translate", label:"Innovation Translates", color:"bg-innovation", lightBg:"bg-innovation-light", borderColor:"border-innovation" },
    { key:"Adopt", label:"Care Adopts", color:"bg-care", lightBg:"bg-care-light", borderColor:"border-care" },
  ];

  return (
    <div className="space-y-4">
      {/* Title */}
      <div className="text-center mb-2">
        <h2 className="text-lg font-bold text-navy">The Accelerator Loop: From Labs to Lives</h2>
        <p className="text-sm text-gray-500 mt-1">Knowledge moves from production through translation to adoption — or gets stuck</p>
      </div>

      {/* Flow legend */}
      <div className="flex flex-wrap justify-center gap-3 mb-2">
        {ACCELERATOR_FLOWS.map(flow => (
          <button
            key={flow.name}
            onMouseEnter={() => setHoveredFlow(flow)}
            onMouseLeave={() => setHoveredFlow(null)}
            onClick={() => setHoveredFlow(f => f?.name === flow.name ? null : flow)}
            className={`text-xs px-3 py-1.5 rounded-full border-2 transition-all cursor-pointer ${hoveredFlow?.name === flow.name ? 'shadow-md scale-105' : 'opacity-70 hover:opacity-100'}`}
            style={{ borderColor: flow.color, color: flow.color, backgroundColor: hoveredFlow?.name === flow.name ? flow.color + '15' : 'white' }}
          >
            {flow.name}
          </button>
        ))}
      </div>

      {/* Three columns — desktop grid, mobile stacked */}
      <div className="hidden md:grid grid-cols-3 gap-3">
        {stageConfig.map((stage) => (
          <div key={stage.key} className={`${stage.lightBg} rounded-xl p-3 border ${stage.borderColor}`}>
            <div className="flex items-center gap-2 mb-3">
              <div className={`w-2.5 h-2.5 rounded-full ${stage.color}`} />
              <span className="text-sm font-bold text-gray-800">{stage.label}</span>
            </div>
            <div className="space-y-1.5">
              {stages[stage.key].map(a => (
                <ActivityCard key={a.code} activity={a} onClick={onSelect} highlighted={flowCodes.includes(a.code)} dimmed={hoveredFlow && !flowCodes.includes(a.code)} />
              ))}
            </div>
          </div>
        ))}
      </div>
      <div className="md:hidden space-y-3">
        {stageConfig.map((stage, idx) => (
          <div key={stage.key}>
            <div className={`${stage.lightBg} rounded-xl p-3 border ${stage.borderColor}`}>
              <div className="flex items-center gap-2 mb-2">
                <div className={`w-2.5 h-2.5 rounded-full ${stage.color}`} />
                <span className="text-sm font-bold text-gray-800">{stage.label}</span>
                <span className="text-[10px] text-gray-400 ml-auto">{stages[stage.key].length} activities</span>
              </div>
              <div className="grid grid-cols-2 gap-1.5">
                {stages[stage.key].map(a => (
                  <ActivityCard key={a.code} activity={a} onClick={onSelect} highlighted={flowCodes.includes(a.code)} dimmed={hoveredFlow && !flowCodes.includes(a.code)} />
                ))}
              </div>
            </div>
            {idx < stageConfig.length - 1 && (
              <div className="flex justify-center py-1">
                <span className="text-gray-300 text-lg">↓</span>
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Flow chains detail */}
      {hoveredFlow && (
        <div className="bg-white rounded-xl border-2 p-4 mt-2 shadow-sm" style={{ borderColor: hoveredFlow.color }}>
          <h3 className="font-bold text-sm mb-2" style={{ color: hoveredFlow.color }}>{hoveredFlow.name} Chain</h3>
          <div className="flex items-center gap-2 text-sm text-gray-700 flex-wrap">
            <span className="font-medium text-research-dark">{hoveredFlow.produce}</span>
            <span className="text-gray-400">→</span>
            <span className="font-medium text-innovation-dark">{hoveredFlow.translate}</span>
            <span className="text-gray-400">→</span>
            <span className="font-medium text-care-dark">{hoveredFlow.adopt}</span>
          </div>
          <div className="mt-2 text-xs text-gray-500">
            {getActivity(hoveredFlow.produce)?.name} → {getActivity(hoveredFlow.translate)?.name} → {getActivity(hoveredFlow.adopt)?.name}
          </div>
        </div>
      )}

      {/* Awareness enables bar */}
      <div className="bg-awareness-light rounded-xl p-4 border border-awareness">
        <div className="flex items-center gap-2 mb-3">
          <div className="w-2.5 h-2.5 rounded-full bg-awareness" />
          <span className="text-sm font-bold text-awareness-dark">Awareness Enables All Stages</span>
        </div>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          {AWARENESS_ENABLES.map(ae => {
            const a = getActivity(ae.activity);
            return a && (
              <div key={ae.activity} className="bg-white rounded-lg p-2.5 border border-awareness">
                <span className="text-xs font-bold text-awareness-dark">{ae.activity}</span>
                <p className="text-xs text-gray-600 mt-0.5">{a.name}</p>
                <p className="text-[10px] text-gray-400 mt-1 italic">{ae.enables}</p>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── LIST VIEW ──────────────────────────────────────────────────────
function ListView({ activities, onSelect }) {
  const [sortKey, setSortKey] = useState('code');
  const [sortDir, setSortDir] = useState(1);

  const sorted = useMemo(() => {
    return [...activities].sort((a, b) => {
      let va = a[sortKey] || '';
      let vb = b[sortKey] || '';
      if (typeof va === 'string') va = va.toLowerCase();
      if (typeof vb === 'string') vb = vb.toLowerCase();
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });
  }, [activities, sortKey, sortDir]);

  const toggleSort = (key) => {
    if (sortKey === key) setSortDir(d => -d);
    else { setSortKey(key); setSortDir(1); }
  };

  const SortHeader = ({ k, label }) => (
    <th className="px-3 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider cursor-pointer hover:text-gray-800 select-none" onClick={() => toggleSort(k)}>
      {label} {sortKey === k ? (sortDir === 1 ? '↑' : '↓') : ''}
    </th>
  );

  return (
    <div className="overflow-x-auto bg-white rounded-xl border shadow-sm">
      <table className="w-full text-sm">
        <thead className="bg-gray-50 border-b">
          <tr>
            <SortHeader k="code" label="Code" />
            <SortHeader k="name" label="Activity" />
            <SortHeader k="domain" label="Domain" />
            <SortHeader k="pillar" label="Pillar" />
            <SortHeader k="horizon" label="Horizon" />
            <SortHeader k="impact" label="Impact" />
            <th className="px-3 py-2 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">EHDS</th>
          </tr>
        </thead>
        <tbody className="divide-y divide-gray-100">
          {sorted.map(a => {
            const dc = DOMAIN_COLORS[a.domain];
            return (
              <tr key={a.code} className="hover:bg-gray-50 cursor-pointer transition-colors" onClick={() => onSelect(a)}>
                <td className={`px-3 py-2.5 font-bold text-xs ${dc.text}`}>{a.code}</td>
                <td className="px-3 py-2.5 text-gray-800 max-w-xs">{a.name}</td>
                <td className="px-3 py-2.5"><span className={`text-xs px-2 py-0.5 rounded-full ${dc.badge} inline-flex items-center gap-1`}><DomainIcon name={a.domain} size={14} />{a.domain}</span></td>
                <td className="px-3 py-2.5 text-gray-600 text-xs">{a.pillar ? <span className="inline-flex items-center gap-1"><DomainIcon name={a.pillar} size={14} />{a.pillar}</span> : '—'}</td>
                <td className="px-3 py-2.5 text-gray-600 text-xs">{HORIZONS.find(h=>h.value===a.horizon)?.label}</td>
                <td className="px-3 py-2.5 text-gray-600 text-xs">{a.impact}</td>
                <td className="px-3 py-2.5">{a.ehds ? <span className="text-xs px-1.5 py-0.5 rounded bg-awareness-light text-awareness-dark font-medium">EHDS</span> : ''}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ─── FOCUS AREA CARDS ───────────────────────────────────────────────
const FOCUS_AREAS = [
  { label:"I coordinate research", sub:"Research councils · Academics · Funders", domain:"Research", pillar:null, icon:"Research" },
  { label:"I deliver healthcare", sub:"Hospitals · Health directorates · Clinicians", domain:"Care", pillar:null, icon:"Care" },
  { label:"I build or invest in health innovation", sub:"Pharma · Medtech · Investors · Startups", domain:"Innovation", pillar:null, icon:"Innovation" },
  { label:"I shape health policy", sub:"Ministries · NCM · WHO · Parliament", domain:null, pillar:"Policy", icon:"Policy" },
  { label:"I work in health data", sub:"Data offices · Registries · Interoperability", domain:null, pillar:"Data", icon:"Data" },
  { label:"I educate or advocate", sub:"NGOs · Patient orgs · Municipalities · Educators", domain:null, pillar:null, awareness:true, icon:"Awareness" },
];

function FocusCards({ filters, setFilters, activeFocus, setActiveFocus }) {
  const handleClick = (fa, idx) => {
    if (fa.awareness) {
      setActiveFocus(idx);
      setFilters({});
      setTimeout(() => {
        const el = document.getElementById('awareness-foundation');
        if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
      }, 100);
      return;
    }
    setActiveFocus(idx);
    setFilters({ domain: fa.domain || null, pillar: fa.pillar || null });
  };

  const clearFocus = () => {
    setActiveFocus(null);
    setFilters({});
  };

  if (activeFocus !== null) {
    const fa = FOCUS_AREAS[activeFocus];
    const dc = DOMAIN_COLORS[fa.icon] || DOMAIN_COLORS.Awareness;
    return (
      <div className="flex items-center gap-2 mb-3 no-print">
        <span className="text-xs text-gray-500">Showing:</span>
        <span className={`inline-flex items-center gap-1.5 text-xs font-medium ${dc.badge} rounded-full px-3 py-1`}>
          <img src={ICON_MAP[fa.icon]} alt="" style={{width:14,height:14}} />
          {fa.label}
        </span>
        <button onClick={clearFocus} className="text-xs text-gray-400 hover:text-gray-600 underline">Show all</button>
      </div>
    );
  }

  return (
    <div className="mb-3 no-print">
      <p className="text-xs text-gray-400 mb-2">I want to explore activities for my role:</p>
      <div className="flex flex-nowrap md:grid md:grid-cols-3 lg:grid-cols-6 gap-2 overflow-x-auto pb-2 md:overflow-visible md:pb-0" style={{WebkitOverflowScrolling:'touch'}}>
        {FOCUS_AREAS.map((fa, i) => {
          const dc = DOMAIN_COLORS[fa.icon] || DOMAIN_COLORS.Awareness;
          return (
            <button
              key={i}
              onClick={() => handleClick(fa, i)}
              className={`group text-left bg-white hover:shadow-md border ${dc.border} rounded-lg px-3 py-2.5 transition-all flex flex-col items-start shrink-0 w-[160px] md:w-auto md:shrink`}
            >
              <div className="flex items-start gap-1.5 mb-1">
                <img src={ICON_MAP[fa.icon]} alt="" style={{width:16,height:16,flexShrink:0,marginTop:1}} />
                <span className={`text-xs font-semibold ${dc.text} leading-tight`}>{fa.label}</span>
              </div>
              <span className="text-[10px] text-gray-400 leading-tight pl-[22px]">{fa.sub}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─── FILTER BAR ─────────────────────────────────────────────────────
function FilterBar({ filters, setFilters, setActiveFocus, totalCount, filteredCount }) {
  const update = (key, val) => setFilters(f => ({ ...f, [key]: val }));
  const SelectFilter = ({ label, value, options, filterKey }) => (
    <select
      value={value || ''}
      onChange={e => update(filterKey, e.target.value || null)}
      className="text-xs border border-gray-200 rounded-lg px-2.5 py-1.5 bg-white text-gray-700 focus:ring-2 focus:ring-research/20 focus:border-research outline-none"
    >
      <option value="">{label}</option>
      {options.map(o => <option key={o.value || o} value={o.value || o}>{o.label || o}</option>)}
    </select>
  );

  return (
    <div className="flex flex-wrap items-center gap-2 py-2 no-print">
      <SelectFilter label="All Domains" value={filters.domain} options={[...DOMAINS, "Awareness"].map(d=>({value:d,label:d}))} filterKey="domain" />
      <SelectFilter label="All Pillars" value={filters.pillar} options={PILLARS.map(p=>({value:p,label:p}))} filterKey="pillar" />
      <SelectFilter label="All Horizons" value={filters.horizon} options={HORIZONS} filterKey="horizon" />
      <label className="flex items-center gap-1.5 text-xs cursor-pointer bg-orange-50 border border-orange-200 rounded-lg px-2.5 py-1.5 text-orange-800 font-medium hover:bg-orange-100 transition-colors">
        <input type="checkbox" checked={filters.ehdsOnly || false} onChange={e => update('ehdsOnly', e.target.checked)} className="rounded border-orange-300 text-orange-600 focus:ring-orange-400" />
        EHDS Critical Window
      </label>
      <input
        type="search"
        placeholder="Search activities…"
        value={filters.search || ''}
        onChange={e => update('search', e.target.value)}
        className="text-xs border border-gray-200 rounded-lg px-3 py-1.5 w-40 focus:ring-2 focus:ring-research/20 focus:border-research outline-none"
      />
      <span className="text-xs text-gray-400 ml-auto">
        Showing {filteredCount} of {totalCount} activities
      </span>
      {(filters.domain || filters.pillar || filters.horizon || filters.ehdsOnly || filters.search) && (
        <button onClick={() => { setFilters({}); setActiveFocus(null); }} className="text-xs text-research hover:text-research-dark underline">Clear filters</button>
      )}
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('grid');
  const [filters, setFilters] = useState({});
  const [selectedActivity, setSelectedActivity] = useState(null);
  const [activeFocus, setActiveFocus] = useState(null);

  const filtered = useMemo(() => filterActivities(ACTIVITIES, filters), [filters]);
  const highlightedCodes = filters.ehdsOnly ? EHDS_CRITICAL : null;

  const views = [
    { id:'grid', label:'Grid View', icon:'⊞' },
    { id:'loop', label:'Accelerator Loop', icon:'⟳' },
    { id:'list', label:'List', icon:'≡' },
  ];

  return (
    <div className="min-h-screen bg-gray-50">
      {/* Header */}
      <header className="bg-navy border-b border-navy sticky top-0 z-40 shadow-sm">
        <div className="max-w-7xl mx-auto px-4 py-3">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-3">
              <img src={WH2040_LOGO} alt="WH2040" className="w-10 h-10" />
              <div>
                <h1 className="text-sm md:text-lg font-bold text-white leading-tight">Nordic Charter for Women's Health 2040</h1>
                <p className="text-[10px] md:text-xs text-research-light mt-0.5 hidden sm:block">28 Activities — Implementation Playbook</p>
              </div>
              <img src="WH2040_framework_icon.png" alt="WH2040 Framework" className="hidden md:block ml-auto" style={{width:'80px',height:'auto',opacity:0.8}} />
            </div>
            <div className="flex gap-1 bg-white/10 rounded-lg p-0.5 no-print">
              {views.map(v => (
                <button
                  key={v.id}
                  onClick={() => setView(v.id)}
                  className={`text-xs px-2 md:px-3 py-1.5 rounded-md transition-all font-medium ${view === v.id ? 'bg-white shadow text-navy' : 'text-white/70 hover:text-white'}`}
                >
                  <span className="mr-1">{v.icon}</span><span className="hidden sm:inline">{v.label}</span>
                </button>
              ))}
            </div>
          </div>
          <FilterBar filters={filters} setFilters={setFilters} setActiveFocus={setActiveFocus} totalCount={ACTIVITIES.length} filteredCount={filtered.length} />
        </div>
      </header>

      {/* Content */}
      <main className="max-w-7xl mx-auto px-4 py-4">
        <FocusCards filters={filters} setFilters={setFilters} activeFocus={activeFocus} setActiveFocus={setActiveFocus} />
        {view === 'grid' && <GridView activities={filtered} onSelect={setSelectedActivity} highlightedCodes={highlightedCodes} />}
        {view === 'loop' && <LoopView activities={filtered} onSelect={setSelectedActivity} />}
        {view === 'list' && <ListView activities={filtered} onSelect={setSelectedActivity} />}
      </main>

      {/* Footer */}
      <footer className="mt-8 py-6 no-print" style={{borderTop:'3px solid #4A8F8F'}}>
        <div className="max-w-7xl mx-auto px-4">
          <div className="flex flex-col sm:flex-row items-center sm:items-start gap-4">
            <div className="flex items-center gap-2 shrink-0">
              <img src={WH2040_LOGO} alt="WH2040" className="w-8 h-8" />
              <strong className="text-sm text-navy">Women's Health 2040</strong>
            </div>
            <div className="flex-1 text-center sm:text-left text-xs text-gray-500 space-y-1">
              <p className="italic text-gray-400">"Health as birthright, not benefit."</p>
              <p>Open commons framework · CC BY 4.0</p>
              <p>Produced by Scita Health ApS</p>
            </div>
            <div className="flex flex-col items-center sm:items-end gap-1 text-xs shrink-0">
              <a href="https://womenshealth2040.org" target="_blank" rel="noopener" className="text-research hover:text-research-dark" style={{textDecoration:'none'}}>womenshealth2040.org</a>
              <a href="mailto:hello@womenshealth2040.org" className="text-research hover:text-research-dark" style={{textDecoration:'none'}}>hello@womenshealth2040.org</a>
              <span className="text-gray-400">#WomensHealth2040</span>
            </div>
          </div>
        </div>
      </footer>

      {/* Detail panel */}
      {selectedActivity && <ActivityDetail activity={selectedActivity} onClose={() => setSelectedActivity(null)} onNavigate={setSelectedActivity} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
